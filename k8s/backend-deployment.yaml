# 1. The Deployment (Runs your app)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-a-backend
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend-container
        image: 378607873661.dkr.ecr.eu-north-1.amazonaws.com/project-a-backend:latest
        ports:
        - containerPort: 3000
        # --- THIS IS THE NEW SECTION ---
        env:
        - name: DB_HOST
          value: "terraform-20260313110452607000000001.ctwcgyikc1n3.eu-north-1.rds.amazonaws.com"
        - name: DB_USER
          value: "dbadmin" # Matches main.tf
        - name: DB_NAME
          value: "feedbackdb" # Matches main.tf
        - name: DB_PORT
          value: "5432"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret # Reads securely from your secret.yaml!
              key: password
        # -------------------------------
---
# 2. The Service
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80       
      targetPort: 3000