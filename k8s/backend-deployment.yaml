apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-a-backend
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend-container
        image: 378607873661.dkr.ecr.eu-north-1.amazonaws.com/project-a-backend:a1b2c3d
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          value: "terraform-20260313110452607000000001.ctwcgyikc1n3.eu-north-1.rds.amazonaws.com"
        - name: DB_USER
          value: "dbadmin"
        - name: DB_NAME
          value: "feedbackdb"
        - name: DB_PORT
          value: "5432"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80       
      targetPort: 3000