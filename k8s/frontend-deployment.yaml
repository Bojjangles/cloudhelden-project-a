# 1. The Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-a-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-container
        image: 378607873661.dkr.ecr.eu-north-1.amazonaws.com/project-a-frontend:latest
        ports:
        - containerPort: 80

---
# 2. The Frontend Service (Creates the Public Web Address)
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80       # The public port for HTTP traffic
      targetPort: 80 # The internal port Nginx is listening on