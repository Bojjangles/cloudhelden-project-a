name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. TEST [cite: 93]
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Dependencies
        run: cd backend && npm install

      - name: Run Unit Tests
        [cite_start]run: cd backend && npm test # PDF requires at least 5 tests 

# 2. BUILD & PUSH
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          [cite_start]IMAGE_TAG: ${{ github.sha }} # Use Commit SHA as required [cite: 97]
        run: |
          docker build -t $ECR_REGISTRY/project-a-backend:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/project-a-backend:$IMAGE_TAG
          docker build -t $ECR_REGISTRY/project-a-frontend:$IMAGE_TAG ./frontend
          docker push $ECR_REGISTRY/project-a-frontend:$IMAGE_TAG

      # 3. DEPLOY [cite: 100]
      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name project-a-cluster --region eu-north-1

      - name: Deploy to EKS
        run: |
          # Replace image tags in manifests with the current SHA [cite: 97]
          sed -i "s|image:.*project-a-backend:.*|image: ${{ steps.login-ecr.outputs.registry }}/project-a-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|image:.*project-a-frontend:.*|image: ${{ steps.login-ecr.outputs.registry }}/project-a-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/project-a-backend --timeout=120s # [cite: 101]