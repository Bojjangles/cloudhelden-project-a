<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Feedback Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 class="text-center mb-4">🔐 Admin Login</h2>
    <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Admin Username">
    </div>
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••">
    </div>
    <button class="btn btn-primary w-100" onclick="login()">Sign In 🚀</button>
    <div id="message" class="mt-3 text-center small text-danger"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>

<script>
    // ⚙️ CONFIGURATION - Update these from your Terraform Outputs
    const POOL_DATA = {
        UserPoolId: 'eu-north-1_g8QRjVPqe', // Your Cognito User Pool ID
        ClientId: '1nnmnm6cumdjs85c710kof7ioa'   // Your Cognito Client ID
    };

    const userPool = new AmazonCognitoIdentity.CognitoUserPool(POOL_DATA);

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('message');

        const authDetails = new AmazonCognitoIdentity.AuthenticationDetails({ Username: username, Password: password });
        const userData = { Username: username, Pool: userPool };
        const cognitoUser = new AmazonCognitoIdentity.CognitoUser(userData);

        cognitoUser.authenticateUser(authDetails, {
            onSuccess: (result) => {
                // Save the token to local storage so admin.html can see it
                localStorage.setItem('adminToken', result.getIdToken().getJwtToken());
                window.location.href = 'admin.html';
            },
            onFailure: (err) => {
                msg.innerText = err.message || JSON.stringify(err);
            },
            newPasswordRequired: (userAttributes) => {
                msg.innerText = "New password required. Use AWS CLI to set a permanent password.";
            }
        });
    }
</script>
</body>
</html>
