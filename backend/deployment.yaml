# 1. The Deployment (Runs your app)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-a-backend
spec:
  replicas: 2 # We have 2 nodes, let's run 1 copy on each!
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend-container
        image: 378607873661.dkr.ecr.eu-north-1.amazonaws.com/project-a-backend:latest
        ports:
        - containerPort: 3000

---
# 2. The Service (Creates the Load Balancer)
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80       # The public port on the internet
      targetPort: 3000 # The port your Node.js app is listening on